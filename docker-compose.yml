version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: gamer_machine_db
    environment:
      POSTGRES_USER: gamer
      POSTGRES_PASSWORD: gamer
      POSTGRES_DB: gamer_machine
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gamer -d gamer_machine']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: gamer_machine_api
    env_file:
      - services/api/.env
    environment:
      # Override DATABASE_URL to use internal Docker network (postgres service, port 5432)
      DATABASE_URL: postgresql://gamer:gamer@postgres:5432/gamer_machine
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
